<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoice VAT Calculator</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <link rel="stylesheet" type="text/css" href="css/vat-app.css">
</head>
<body>
    <div class="main">
        
        <h1>Invoice VAT Calculator</h1>

        <div id="alertPlaceholder"></div>
        
        <div class="row mb-3 align-items-center">
            <label for="amountInput" class="col-12 col-md-2 col-form-label">Amount</label>
            <div class="col-12 col-md-10">
                <input type="text" class="form-control" id="amountInput" placeholder="Enter Amount">
            </div>
        </div>

        <div class="row mb-3 align-items-center">
            <label for="percentInput" class="col-12 col-md-2 col-form-label">Percent (Optional)</label>
            <div class="col-12 col-md-10">
                <div class="input-group">
                    <input type="text" class="form-control" id="percentInput" placeholder="100">
                    <span class="input-group-text">%</span>
                </div>
            </div>
        </div>

        <div class="row mb-3 align-items-center">
            <label for="vatInput" class="col-12 col-md-2 col-form-label">Value Added Tax (VAT)</label>
            <div class="col-12 col-md-10">
                <div class="input-group">
                    <input type="text" class="form-control" id="vatInput" placeholder="12">
                    <span class="input-group-text">%</span>
                </div>
            </div>
        </div>

        <div class="row mb-3 align-items-center">
            <label for="totalAmount" class="col-12 col-md-2 col-form-label">Total Amount</label>
            <div class="col-12 col-md-10">
                <input type="text" class="form-control" id="totalAmount">
            </div>
        </div>

        <div class="row mb-3 align-items-center">
            <label for="netOfVAT" class="col-12 col-md-2 col-form-label">Net of VAT</label>
            <div class="col-12 col-md-10">
                <input type="text" class="form-control" id="netOfVAT">
            </div>
        </div>

        <div class="row mb-3 align-items-center">
            <label for="lessOfVAT" class="col-12 col-md-2 col-form-label">Less of VAT</label>
            <div class="col-12 col-md-10">
                <input type="text" class="form-control" id="lessOfVAT">
            </div>
        </div>

        <div class="row mb-3 align-items-center">
            <label for="amountInWords" class="col-12 col-md-2 col-form-label">Amount in Words</label>
            <div class="col-12 col-md-10">
                <input type="text" class="form-control" id="amountInWords">
            </div>
        </div>

        <!-- BUTTONS WRAPPER -->
        <div class="row mb-3">
            <div class="col-12 text-center">
                <button type="button" id="calculateBtn" class="btn btn-primary me-2 mb-2">Calculate</button>
                <button type="button" id="clearBtn" class="btn btn-warning mb-2">Clear</button>
            </div>
        </div>

    </div>
    

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/vat-app.js"></script>
</body>
</html>
