<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoice VAT Calculator</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <link rel="stylesheet" type="text/css" href="css/vat-app.css">
</head>
<body>
    <div class="input-group mb-3">
        <span class="input-group-text col-sm-2 col-form-label" id="inputGroup-sizing-default">Amount</span>
        <input type="text" class="form-control" id="amountInput" aria-label="Sizing example input" aria-describedby="inputGroup-sizing-default" placeholder="Enter Amount">
    </div>

    <div class="input-group mb-3">
        <span class="input-group-text col-sm-2 col-form-label" id="inputGroup-sizing-default">Percent (Optional)</span>
        <input type="text" class="form-control" id="percentInput" aria-label="Sizing example input" aria-describedby="inputGroup-sizing-default" placeholder="100">
        <span class="input-group-text col-sm-default col-form-label" id="inputGroup-sizing-default">%</span>
    </div>

    <div class="input-group mb-3">
        <span class="input-group-text col-sm-2 col-form-label" id="inputGroup-sizing-default">Value Added Tax (VAT)</span>
        <input type="text" class="form-control" id="vatInput" aria-label="Sizing example input" aria-describedby="inputGroup-sizing-default" placeholder="12">
        <span class="input-group-text col-sm-default col-form-label" id="inputGroup-sizing-default">%</span>
    </div>

    <button type="button" id="calculateBtn" class="btn btn-secondary">Calculate</button>

    <div class="input-group mb-3">
        <span class="input-group-text col-sm-2 col-form-label" id="inputGroup-sizing-default">Total Amount</span>
        <input type="text" readonly class="form-control" id="totalAmount" aria-label="Sizing example input" aria-describedby="inputGroup-sizing-default">
    </div>

    <div class="input-group mb-3">
        <span class="input-group-text col-sm-2 col-form-label" id="inputGroup-sizing-default">Net of VAT</span>
        <input type="text" readonly class="form-control" id="netOfVAT" aria-label="Sizing example input" aria-describedby="inputGroup-sizing-default">
    </div>

    <div class="input-group mb-3">
        <span class="input-group-text col-sm-2 col-form-label" id="inputGroup-sizing-default">Less of VAT</span>
        <input type="text" readonly class="form-control" id="lessOfVAT" aria-label="Sizing example input" aria-describedby="inputGroup-sizing-default">
    </div>

    <div class="input-group mb-3">
        <span class="input-group-text col-sm-2 col-form-label" id="inputGroup-sizing-default">Amount in words</span>
        <input type="text" readonly class="form-control" id="amountInWords" aria-label="Sizing example input" aria-describedby="inputGroup-sizing-default">
    </div>

    <button type="button" id="clearBtn" class="btn btn-warning">Clear</button>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/vat-app.js"></script>
</body>
</html>
